services:
  - type: web
    name: healthcare-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: ~18.18.0
      - key: PORT
        value: 5001
      - key: MONGO_URI
        sync: false # User must set this manually in the Render dashboard
